<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 0; background: transparent;
  }
  #wrapper { position: relative; }
  #addr-input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid #d6d3d1; border-radius: 6px; outline: none; color: #1c1917;
  }
  #addr-input:focus { border-color: #78716c; }
  #suggestions {
    border: 1px solid #e7e5e4; border-top: none; border-radius: 0 0 6px 6px;
    max-height: 260px; overflow-y: auto; background: white;
  }
  .suggestion-item {
    padding: 10px 12px; cursor: pointer; font-size: 14px; color: #292524;
    border-bottom: 1px solid #f5f5f4;
  }
  .suggestion-item:hover { background: #f5f5f4; }
  .suggestion-item:last-child { border-bottom: none; }
  #status { font-size: 12px; color: #a8a29e; padding: 5px 2px 0 2px; min-height: 16px; }
</style>
</head>
<body>
<div id="wrapper">
  <input type="text" id="addr-input" placeholder="Ex : 12 rue de la Paix, Vincennes" autocomplete="off" />
  <div id="suggestions"></div>
  <div id="status"></div>
</div>

<script>
  const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
  const RENDER = "streamlit:render";
  const COMPONENT_READY = "streamlit:componentReady";
  const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";

  function _sendMessage(type, data) {
    var outboundData = Object.assign({ isStreamlitMessage: true, type: type }, data);
    window.parent.postMessage(outboundData, "*");
  }

  function setFrameHeight() {
    // On diffère la mesure après le rendu réel du navigateur (double
    // requestAnimationFrame) : mesurer juste après une mutation du DOM peut
    // donner une valeur périmée (trop grande) avant que la mise en page ne
    // soit recalculée, ce qui laissait un espace vide résiduel après une
    // sélection (liste de suggestions effacée mais cadre non réduit).
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const height = document.documentElement.scrollHeight;
        _sendMessage(SET_FRAME_HEIGHT, { height: height + 6 });
      });
    });
  }

  function notifyHost(value) {
    _sendMessage(SET_COMPONENT_VALUE, { value: value, dataType: "json" });
  }

  window.addEventListener("message", (event) => {
    if (event.data && event.data.type === RENDER) {
      // Rien à recevoir de Python pour l'instant côté arguments.
    }
  });
  _sendMessage(COMPONENT_READY, { apiVersion: 1 });
  window.addEventListener("load", () => window.setTimeout(setFrameHeight, 0));
  window.addEventListener("resize", setFrameHeight);

  // Filet de sécurité : les appels explicites à setFrameHeight() ci-dessous
  // couvrent les cas prévus (saisie, résultats, sélection), mais un cas non
  // anticipé (rendu différent d'un navigateur/webview mobile, clavier
  // virtuel modifiant la mise en page, etc.) pourrait laisser le cadre à
  // une taille périmée. Un MutationObserver réagit à TOUT changement du DOM
  // du composant, quelle qu'en soit la cause, sans avoir à les énumérer.
  new MutationObserver(() => setFrameHeight()).observe(
    document.getElementById("wrapper"),
    { childList: true, subtree: true, characterData: true }
  );

  const input = document.getElementById("addr-input");
  const suggestionsDiv = document.getElementById("suggestions");
  const statusDiv = document.getElementById("status");
  let debounceTimer = null;
  let corsFailed = false;

  input.addEventListener("input", () => {
    window.clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (q.length < 3) {
      suggestionsDiv.innerHTML = "";
      statusDiv.textContent = "";
      setFrameHeight();
      return;
    }
    debounceTimer = window.setTimeout(() => search(q), 300);
  });

  async function search(q) {
    if (corsFailed) return;
    statusDiv.textContent = "Recherche...";
    setFrameHeight();
    try {
      const resp = await fetch(
        "https://api-adresse.data.gouv.fr/search/?q=" + encodeURIComponent(q) + "&limit=6"
      );
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      renderSuggestions(data.features || []);
    } catch (err) {
      corsFailed = true;
      statusDiv.textContent =
        "Suggestions automatiques indisponibles ici. Utilisez la recherche manuelle ci-dessous.";
      suggestionsDiv.innerHTML = "";
      setFrameHeight();
    }
  }

  function departementFromGeo(codePostal, codeInsee) {
    codeInsee = String(codeInsee || "");
    codePostal = String(codePostal || "");
    if (codeInsee.startsWith("2A") || codeInsee.startsWith("2B")) return codeInsee.slice(0, 2);
    const dom = ["971", "972", "973", "974", "976"];
    if (codeInsee.length >= 3 && dom.includes(codeInsee.slice(0, 3))) return codeInsee.slice(0, 3);
    if (codePostal.length >= 3 && dom.includes(codePostal.slice(0, 3))) return codePostal.slice(0, 3);
    if (codePostal.length >= 2) return codePostal.slice(0, 2);
    if (codeInsee.length >= 2) return codeInsee.slice(0, 2);
    return null;
  }

  function renderSuggestions(features) {
    suggestionsDiv.innerHTML = "";
    statusDiv.textContent = "";
    features.forEach((f) => {
      const props = f.properties;
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.textContent = props.label;
      div.onclick = () => {
        const coords = f.geometry.coordinates;
        notifyHost({
          label: props.label,
          commune: props.city,
          code_insee: props.citycode,
          code_postal: props.postcode,
          score: props.score,
          longitude: coords[0],
          latitude: coords[1],
          departement: departementFromGeo(props.postcode, props.citycode),
        });
        suggestionsDiv.innerHTML = "";
        input.value = props.label;
        setFrameHeight();
        window.setTimeout(setFrameHeight, 150);
      };
      suggestionsDiv.appendChild(div);
    });
    setFrameHeight();
  }
</script>
</body>
</html>
